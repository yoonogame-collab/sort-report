<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序法</title>
</head>
<body>
    <h1>氣泡排序法</h1>
    <p>原始陣列: <span id="original-array"></span></p>
    <p>排序後陣列: <span id="sorted-array"></span></p>

    <script>
        // 氣泡排序函式
        function bubbleSort(arr) {
            let n = arr.length;
            for (let i = 0; i < n - 1; i++) {
                let swapped = false;
                for (let j = 0; j < n - i - 1; j++) {
                    if (arr[j] > arr[j + 1]) {
                        // 交換元素
                        let temp = arr[j];
                        arr[j] = arr[j + 1];
                        arr[j + 1] = temp;
                        swapped = true;
                    }
                }
                // 如果沒有發生交換，提早結束
                if (!swapped) break;
            }
            return arr;
        }

        // 測試資料
        const data = [64, 34, 25, 12, 22, 11, 90];
        document.getElementById("original-array").textContent = data.join(", ");

        // 排序並顯示結果
        const sortedData = bubbleSort([...data]); // 使用副本避免修改原始陣列
        document.getElementById("sorted-array").textContent = sortedData.join(", ");
    </script>
</body>
</html>
